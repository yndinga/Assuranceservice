# Exemple local : docker compose up --build
services:
  assurance-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: assurance-service:local
    ports:
      - "8087:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Chaîne SQL : adapter host/port (ex. host.docker.internal pour SQL sur la machine hôte Windows/Mac)
      ConnectionStrings__AssuranceConnection: "Server=host.docker.internal,1433;Database=MS_ASSURANCE;User Id=sa;Password=YourPassword;TrustServerCertificate=True;"
      # Désactiver migrations au démarrage si la base n’est pas joignable depuis le conteneur
      # ApplyMigrationsAtStartup: "false"
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
