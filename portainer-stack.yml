# Stack Portainer - AssuranceService (même structure que DeclarationImportationService)
# Coller dans Portainer > Stacks > Web editor

services:
  assuranceservice:
    image: ghcr.io/yndinga/assuranceservice:v1.0.0
    container_name: assuranceservice
    ports:
      - "8087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__AssuranceConnection=${SQL_CONNECTION_STRING:-Server=192.168.3.178,1434;Database=MS_ASSURANCE;User ID=sa;Password=MonMotDePasseFort!;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;}
      - ApplyMigrationsAtStartup=${ApplyMigrationsAtStartup:-true}
      - RabbitMQ__Enabled=${RabbitMQ__Enabled:-false}
      - Consul__Host=${CONSUL_HOST:-host.docker.internal}
      - Consul__Port=8500
      - Consul__ServiceName=AssuranceService
      - Consul__ServiceId=assurance-service-1
      - Consul__ServiceAddress=${CONSUL_SERVICE_ADDRESS:-192.168.2.89}
      - Consul__ServicePort=8087
      - Consul__HealthCheckPath=/health
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "sqlserver:host-gateway"
    restart: unless-stopped
