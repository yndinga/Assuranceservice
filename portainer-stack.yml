# Tag figé par défaut : v1.1.0 (build GHCR après push du tag Git `v1.1.0`).
# Autre version : IMAGE_TAG=v1.1.1 dans l’env du stack (après `git push origin v1.1.1`).

services:
  assuranceservice:
    image: ghcr.io/yndinga/assuranceservice:${IMAGE_TAG:-v1.1.0}
    pull_policy: always
    container_name: assuranceservice
    ports:
      - "8087:8080"
    environment:
      # Incrémente DEPLOY_TRIGGER dans l’env du stack si l’image GHCR a changé mais le conteneur reste ancien.
      - DEPLOY_TRIGGER=${DEPLOY_TRIGGER:-0}
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_CLI_TELEMETRY_OPTOUT=1
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__AssuranceConnection=${SQL_CONNECTION_STRING:-Server=192.168.3.178,1434;Database=MS_ASSURANCE;User ID=sa;Password=MonMotDePasseFort!;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;}
      - Consul__Host=192.168.2.89
      - Consul__Port=8500
      - Consul__ServiceName=AssuranceService
      - Consul__ServiceId=assurance-service-1
      - Consul__ServiceAddress=192.168.2.89
      - Consul__ServicePort=8087
      - Consul__HealthCheckPath=/health
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "sqlserver:host-gateway"
    restart: unless-stopped
